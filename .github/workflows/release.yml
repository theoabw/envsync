name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Test
        run: go test ./...
      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis
      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in \
            linux/amd64 linux/arm64 \
            darwin/amd64 darwin/arm64 \
            windows/amd64 windows/arm64 \
            freebsd/amd64 freebsd/arm64
          do
            os=${target%/*}
            arch=${target#*/}
            name="envsync_${VERSION}_${os}_${arch}"
            binary=envsync
            if [ "$os" = windows ]; then binary=envsync.exe; fi
            mkdir -p "dist/$name"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/$name/$binary" ./cmd/envsync
            cp README.md LICENSE "dist/$name/"
            if [ "$os" = windows ]; then
              (cd dist && zip -qr "$name.zip" "$name")
              mkdir -p "dist/windows/$arch"
              cp "dist/$name/envsync.exe" "dist/windows/$arch/envsync.exe"
            else
              (cd dist && tar -czf "$name.tar.gz" "$name")
            fi
            rm -rf "dist/$name"
          done
      - name: Build Windows installers
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_version=${VERSION#v}
          case "$release_version" in
            *.*.*) product_version="${release_version}.0" ;;
            *) echo "release version must have the form vMAJOR.MINOR.PATCH" >&2; exit 1 ;;
          esac
          for arch in amd64 arm64; do
            makensis \
              -DVERSION="$release_version" \
              -DPRODUCT_VERSION="$product_version" \
              -DARCH="$arch" \
              -DSOURCE_DIR="$GITHUB_WORKSPACE" \
              -DINPUT_BINARY="$GITHUB_WORKSPACE/dist/windows/$arch/envsync.exe" \
              -DOUTPUT_FILE="$GITHUB_WORKSPACE/dist/envsync_windows_${arch}_setup.exe" \
              packaging/windows/envsync.nsi
          done
          rm -rf dist/windows
          (cd dist && sha256sum *.tar.gz *.zip *.exe > checksums.txt)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
